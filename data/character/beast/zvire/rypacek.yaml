appearance: Obvykle líné růžové stvoření s fenomenálním čichem. Při boji se ale dokáže rozkročit jako válečník, kvičí a cení zuby.
mechanics: Rypáček má fenomenální čich a je schopen vyčenichat vzácné magické substance (jako by měl dovednost Bylinkaření). Má speciální druh útoku kdy se jednou za 2 kola boje (první kolo nic nedělá, jen hledá vhodnou pozici) pokusí s rozběhem porazit nepřítele (nepřítem musí přehodit zkoušku na OBR (+ Pohyb) 4). Nepříteli pak trvá kolo vstát a než to udělá útoky na něj mají výhodu.
