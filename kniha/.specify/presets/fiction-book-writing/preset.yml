schema_version: "1.0"
preset:
  id: "fiction-book-writing"
  name: "Fiction Book Writing"
  version: "1.7.0"
  description: "Spec-Driven Development for novel and book writing. Replaces software engineering terminology with storytelling craft: features become story elements, specs become story briefs, plans become story structures, and tasks become scene-by-scene writing tasks. Supports multiple plot structure frameworks, multi-POV architecture (alternating, dual, braided, ensemble, mosaic, frame, chorus, first-person-multiple), and two style modes: author voice sample or humanized AI prose principles."
  author: "Spec Kit Community"
  repository: "https://github.com/adaumann/speckit-preset-fiction-book-writing"
  license: "MIT"
requires:
  speckit_version: ">=0.5.0"
provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Story brief with logline, character arcs, scene beats (Given/When/Then), plot requirements, and reader experience goals."
      replaces: "spec-template"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Story structure template with story bible check gates, act/phase breakdown by plot structure, and supporting document map."
      replaces: "plan-template"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Scene-by-scene writing tasks organized by act and character arc, with research phase, critical checkpoint, and polish pass."
      replaces: "tasks-template"
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      description: "Scene quality checklist: triple purpose test, off-balance ending, character physical presence, dialogue subtext."
      replaces: "checklist-template"
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Story bible with two style modes: author voice sample or humanized AI prose principles (sensory detail, character depth, dialogue craft, scene integrity)."
      replaces: "constitution-template"
    - type: "template"
      name: "characters-template"
      file: "templates/characters-template.md"
      description: "Full character profile: psychological core, speech patterns, vocabulary register, sample dialogue, internal monologue voice examples, body language, emotional landscape, relationship dynamics, scene guidance, verbal tics, and writer summary."
    - type: "template"
      name: "agent-file-template"
      file: "templates/agent-file-template.md"
      description: "Living story context document: active characters, world state, open narrative threads, recent chapters."
      replaces: "agent-file-template"
    - type: "template"
      name: "series-bible-template"
      file: "templates/series-bible-template.md"
      description: "Series-level canon document: world rules, character state registry per book, series arc, continuity constraints, and known contradiction log."
    - type: "template"
      name: "synopsis-template"
      file: "templates/synopsis-template.md"
      description: "Query-ready synopsis: one-page (250–350 words) and full (1,000–2,000 words) formats in present tense, arc resolution summary, and query notes. Post-draft output document."
    - type: "template"
      name: "glossary-template"
      file: "templates/glossary-template.md"
      description: "Consistency reference: invented terms with usage constraints, proper nouns with all variant forms, capitalization and spelling rules, and a consistency log populated by speckit.polish and speckit.continuity."
    - type: "template"
      name: "subplots-template"
      file: "templates/subplots-template.md"
      description: "Subplot beat sheets for every P2+ arc: inciting incident through resolution, main plot intersection map, convergence map for multi-arc chapters, and resolution checklist."
    - type: "template"
      name: "research-template"
      file: "templates/research-template.md"
      description: "Research document for a story: open questions, source notes, world-building facts, and resolved findings that drive task generation."
    - type: "template"
      name: "timeline-template"
      file: "templates/timeline-template.md"
      description: "Story timeline: chapter-by-chapter chronology, elapsed time, scene durations, and continuity cross-references."
    - type: "template"
      name: "world-building-template"
      file: "templates/world-building-template.md"
      description: "World-building reference: setting rules, geography, culture, history, and in-world systems used during drafting."
    - type: "template"
      name: "locations-template"
      file: "templates/locations-template.md"
      description: "Canonical location reference: per-location sensory anchors, atmosphere by time of day, character behavioral tells, scene guidance, prohibited uses, and state log for continuity tracking."
    - type: "template"
      name: "themes-template"
      file: "templates/themes-template.md"
      description: "Thematic contract: motif registry with planned occurrences and transformation arc, symbol tracker, chapter-by-chapter thematic work map, and drift log populated by speckit.continuity."
    - type: "template"
      name: "characters-index-template"
      file: "templates/characters-index-template.md"
      description: "Character index: master roster of all characters with role, affiliations, first appearance, and link to full character profile."
    - type: "template"
      name: "relationships-template"
      file: "templates/relationships-template.md"
      description: "Symmetric relationship arcs: per-pair founding wound, power balance tracker, communication pattern, arc beat sheet (establishing → rupture → midpoint → crisis → resolution), phase tracker, conflict inventory, and series relationship state log. Cross-referenced with character profiles and subplots. Used by speckit.analyze and speckit.continuity to verify relationship progression."
    - type: "template"
      name: "query-letter-template"
      file: "templates/query-letter-template.md"
      description: "Query letter: hook, story body, housekeeping, comp titles, author bio, submission tracker, and personalization notes. Generated and updated by speckit.query."
    - type: "template"
      name: "cover-brief-template"
      file: "templates/cover-brief-template.md"
      description: "Cover design brief: publication details, element list (title/author/series/tagline/extra/custom), visual style direction, colour palette (primary/accent/tertiary/text), typography placement zones, three AI image generation prompts (hero/environment/symbol), platform technical specs (dimensions/DPI/colour model/bleed), print spine calculation, and designer handoff notes. Generated by speckit.cover."
    - type: "template"
      name: "feedback-template"
      file: "templates/feedback-template.md"
      description: "Beta/editorial feedback log: raw notes, categorized issues (Structural/Character/Pacing/Clarity/Factual) with severity, revision tasks generated, and resolution log."
    - type: "template"
      name: "pov-structure-template"
      file: "templates/pov-structure-template.md"
      description: "Multi-POV architecture document: POV mode selection (alternating, dual, braided, ensemble, mosaic, frame, chorus, first-person-multiple), voice differentiation matrix, POV schedule, information asymmetry map, convergence points, relay rules, and arc weighting. Combines with any plot structure."
    - type: "template"
      name: "craft-rules-template"
      file: "templates/craft-rules-template.md"
      description: "Source template for `.specify/memory/craft-rules.md`, generated by speckit.constitution. Contains the universal fiction craft ruleset plus the selectable prose-profile blocks used by humanized-ai mode."
    - type: "template"
      name: "audiobook-draft-template"
      file: "templates/audiobook-draft-template.md"
      description: "Structural template for audiodraft chapter files generated by speckit.implement and speckit.audiobook, including SSML scaffolding, narration/dialogue segmentation, and language-aware xml:lang placeholders."
    - type: "template"
      name: "scene-outline-template"
      file: "templates/scene-outline-template.md"
      description: "Per-scene outline file: opening hook, causal beat sequence, character beats (want vs. get), dialogue requirements (what must be deflected), sensory anchors, thematic work, and story bible compliance notes. Status field (DRAFT/APPROVED/SKIP) gates AI prose generation in speckit.implement."
    - type: "command"
      name: "speckit.brainstorm"
      file: "commands/speckit.brainstorm.md"
      description: "Interactive brainstorming session for any story topic — spec, plan, characters, themes, world-building, locations, series, glossary, pov, research, or timeline. Loads existing topic files as context, asks probing questions in a loop, and produces a brainstorm notes file, a patch to the topic file, or nothing if cancelled. Run before speckit.specify or speckit.plan."
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Create a story brief from a natural language idea: logline, character arcs, scene beats, plot requirements."
    - type: "command"
      name: "speckit.status"
      file: "commands/speckit.status.md"
      description: "Project dashboard: chapter progress table (status × word count × polished version), task completion, checklist gates, workflow stage, and word count projection."
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Detect and resolve narrative ambiguity in the active story brief: character motivation, timeline, POV, world-building gaps."
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Create the story structure from the brief and story bible: act/phase breakdown, chapter map, supporting documents."
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Generate scene-by-scene writing tasks ordered by act and character arc."
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Draft scenes and chapters by executing writing tasks from tasks.md."
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Pre-draft structural alignment check: spec\u2194plan coverage, act proportions, task completeness. Run before speckit.implement."
    - type: "command"
      name: "speckit.continuity"
      file: "commands/speckit.continuity.md"
      description: "Post-draft prose analysis: story bible compliance, character arc consistency, timeline coherence, open thread coverage. Run after speckit.implement."
    - type: "command"
      name: "speckit.revise"
      file: "commands/speckit.revise.md"
      description: "Targeted chapter revision: rewrites only failing passages identified by speckit.checklist or speckit.continuity. Produces a versioned draft file with a diff summary."
    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Generate scene quality checklists: triple purpose test, dialogue subtext, off-balance ending, story bible compliance."
    - type: "command"
      name: "speckit.polish"
      file: "commands/speckit.polish.md"
      description: "Final line-edit pass: prose rhythm, sentence variety, filter words, adverb density, weak verbs, voice register drift, and dialogue attribution. Runs after speckit.checklist PASS."
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Create or update the story bible: style mode selection, plot structure, central dramatic question, craft principles."
    - type: "command"
      name: "speckit.export"
      file: "commands/speckit.export.md"
      description: "Export all drafted chapters to DOCX (Word, submission-ready), EPUB (KDP/Draft2Digital/IngramSpark), or LaTeX (typeset) via pandoc. Assembles chapters in order, preferring polished versions."
    - type: "command"
      name: "speckit.subplot"
      file: "commands/speckit.subplot.md"
      description: "Subplot management: add new P2/P3 arcs mid-draft, check beat completeness and arc absence streaks, rebuild the Convergence Map, resolve dramatic questions, and view the subplot health dashboard. Works with subplots.md; referenced by speckit.analyze and speckit.continuity."
    - type: "command"
      name: "speckit.synopsis"
      file: "commands/speckit.synopsis.md"
      description: "Generate a one-page (250–350 words) and full (1,000–2,000 words) synopsis from plan.md and the draft. Present tense, third person, ending revealed. Run after speckit.plan for an outline synopsis, or post-draft for accuracy."
    - type: "command"
      name: "speckit.query"
      file: "commands/speckit.query.md"
      description: "Generate a query letter from spec.md and synopsis.md: hook, story body, comp titles, author bio, housekeeping. Enforces 250–350 word limit. Updates submission tracker."
    - type: "command"
      name: "speckit.feedback"
      file: "commands/speckit.feedback.md"
      description: "Ingest beta reader or editor notes, categorize by issue type (Structural/Character/Pacing/Clarity/Factual), map to chapter IDs, assign severity, and generate prioritized revision tasks."
    - type: "command"
      name: "speckit.pov"
      file: "commands/speckit.pov.md"
      description: "Multi-POV architecture command: draft pov-structure.md, audit voice differentiation, generate/validate the POV chapter schedule, check information asymmetry (no POV character knows what they shouldn't), and audit relay transitions between POV chapters."
    - type: "command"
      name: "speckit.pacing"
      file: "commands/speckit.pacing.md"
      description: "Emotional rhythm and pacing audit: tension score per chapter (1–10), plateau/peak/valley detection, act-band calibration, Mermaid xychart tension arc output. Flags sagging middles, undersold climaxes, and premature peaks. Read-only."
    - type: "command"
      name: "speckit.statistics"
      file: "commands/speckit.statistics.md"
      description: "Prose statistics report — readability score (Flesch/Kincaid), sentence length variance, passive voice %, adverb density, filter word count, weak verb %, and dialogue balance (% dialogue vs. action vs. narration) per chapter and across the full manuscript. Read-only. Run after speckit.implement or speckit.polish."
    - type: "command"
      name: "speckit.sensitivity"
      file: "commands/speckit.sensitivity.md"
      description: "Sensitivity and representation review: cultural misrepresentation, harmful tropes, anachronisms (historical fiction), identity portrayal, trauma depictions. Scoped by chapter or category. CRITICAL/WARNING/NOTE severity tiers. Read-only."
    - type: "command"
      name: "speckit.outline"
      file: "commands/speckit.outline.md"
      description: "Generate editable scene outline files (outlines/) from plan.md before drafting. Authors review beat sequence, dialogue requirements, sensory anchors, and thematic work, then set status: APPROVED to allow AI drafting or status: SKIP to write the chapter themselves. Gates speckit.implement when outline files are present."
    - type: "command"
      name: "speckit.roleplay"
      file: "commands/speckit.roleplay.md"
      description: "Interactive multi-role play-through of an outline or draft chapter. AI identifies all roles in the scene (Author, Lector, scene characters, Casual Reader, Critique Reader, Editor, and more), assigns each to AI or user, then walks through the chapter beat by beat — pausing after each segment for reaction, Q&A, and optional role switches. Accumulated insights are committed back to the outline or draft as structured revision notes."
    - type: "command"
      name: "speckit.glossary"
      file: "commands/speckit.glossary.md"
      description: "Glossary management command — add (register a new term, proper noun, or usage rule), check (scan drafted chapters for glossary violations — misspellings, wrong capitalisation, rejected variants, banned terms, and restricted-meaning drift), audit (completeness check — find invented terms in drafts not yet registered), and status (dashboard of all terms, open violations, and coverage). Works with glossary.md as the single consistency authority; speckit.polish and speckit.continuity both enforce it."
    - type: "command"
      name: "speckit.help"
      file: "commands/speckit.help.md"
      description: "Workflow advisor — scans all project files to detect the current state of the manuscript and gives prioritized, opinionated recommendations for what to do next and why. Distinct from speckit.status (which reports numbers); this command reasons about the project and acts as a senior editor guiding the session."
    - type: "command"
      name: "speckit.interview"
      file: "commands/speckit.interview.md"
      description: "Interactive one-on-one conversation with an existing character, voiced by AI from their profile and known story presence in spec, plan, outline, or draft. Surfaces character psychology, subtext, and arc state through dialogue. Session can be exported as a summary note to characters/ or notes/."
    - type: "command"
      name: "speckit.research"
      file: "commands/speckit.research.md"
      description: "Research tracking command for fiction. Four modes — add (log a new research item or source finding), resolve (mark an item answered and capture the finding), check (scan drafted chapters for claims not backed by research.md), and status (research dashboard showing open items ranked by story risk). Drives task generation in speckit.tasks. Run any time from first story concept through final polish."
    - type: "command"
      name: "speckit.series"
      file: "commands/speckit.series.md"
      description: "Series management command — init the series bible before Book 1, audit cross-book continuity across all drafted books, sync the series bible after a book is completed, and display a series-wide status dashboard. Operates on series/series-bible.md as the single authority for cross-book canon."
    - type: "command"
      name: "speckit.versions"
      file: "commands/speckit.versions.md"
      description: "Draft version management — list (version timeline for a chapter or all chapters), diff (narrative comparison between two versions of a chapter), log (cross-chapter revision history sorted by date), and tag (attach a label to a specific version for milestone tracking). Read-only except for tag mode."
    - type: "command"
      name: "speckit.audiobook"
      file: "commands/speckit.audiobook.md"
      description: "Audiobook production command — draft (convert a prose chapter to SSML/ElevenLabs audiodraft), voice (add or update narrator/character voice assignments in the story bible), lexicon (register pronunciation entries and export a .pls lexicon file), check (find stale or missing audiodrafts vs. prose drafts), and status (audiodraft production dashboard). Works with constitution.md ## X. Audiobook Production as the single authority for voice configuration."
    - type: "script"
      name: "export"
      file: "scripts/python/export.py"
      description: "Python script invoked by speckit.export. Collects draft chapters, sorts by chapter_id, and shells out to pandoc for DOCX, EPUB, or LaTeX output. Supports --platform argument for KDP (ebook), IngramSpark (ebook + print 6x9), Draft2Digital, Shunn manuscript, and Smashwords. Requires pandoc >= 2.11."
    - type: "command"
      name: "speckit.cover"
      file: "commands/speckit.cover.md"
      description: "Cover design command — generates a cover brief (cover-brief.md), AI image-generation prompts (3 variants: hero subject, environment, symbol), and platform technical specs for KDP ebook, KDP print, IngramSpark, Draft2Digital, and social media. Reads spec.md and constitution.md for title, author, genre, series, tone, and audience. 10 visual style presets: photorealistic, illustrated, painterly, minimalist, typographic, dark-moody, cinematic, retro-pulp, hand-drawn, abstract. Calculates print spine width from page count."
    - type: "command"
      name: "speckit.bio"
      file: "commands/speckit.bio.md"
      description: "Author bio manager — draft, refine, and generate context-specific variants (agent query, reader back matter, platform profile, social media, first-person press kit). Stores canonical short (≤50 words) and long (100–150 words) bios in constitution.md § VII. Variants: agent, reader, platform (25-word KDP/D2D), social (160-char), first-person (website/newsletter), long (press kit). Short bio used by speckit.query; long bio appended by speckit.export as \"About the Author\" back matter."
tags: ["writing", "novel", "fiction", "storytelling", "creative-writing", "kdp"]
