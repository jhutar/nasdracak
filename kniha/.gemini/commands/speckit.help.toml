description = "Workflow advisor вЂ” scans all project files to detect the current state of the manuscript and gives prioritized, opinionated recommendations for what to do next and why. Distinct from speckit.status (which reports numbers); this command reasons about the project and acts as a senior editor guiding the session."

# Source: fiction-book-writing

prompt = """
## User Input

```text
{{args}}
```

Consider user input before proceeding. Accepted arguments:
- *(no argument)* вЂ” full guidance report for the current project state
- `--focus [phase]` вЂ” limit advice to one phase: `planning`, `drafting`, `revision`, `polish`, `submission`
- `--chapter [CHAPTER_ID]` вЂ” focused guidance for one specific chapter (e.g. `--chapter A2.201`)
- A free-text question вЂ” answer it contextually using the project's actual state (e.g. `"Is my spec ready to plan?"`, `"I'm stuck after chapter 3"`)

---

## Purpose

`speckit.help` is the workflow navigator for the fiction writing preset. It reads every project file, maps the state to the workflow lifecycle, and answers the question: **"What should I do next вЂ” and why?"**

**How it differs from `speckit.status`**:
- `speckit.status` reports the numbers: word counts, task completion percentages, chapter status table.
- `speckit.help` reasons about the project: what is blocking progress, what is the highest-value next action, what risks will compound if ignored.

Run `speckit.help` at the start of any working session, when you feel stuck, or when you're not sure which command to use next.

---

## Pre-Execution Checks

- Check if `.specify/extensions.yml` exists. Look for `hooks.before_help`. Process as standard hook block. Skip silently if absent.

---

## Step 1 вЂ” Detect Project State

Run `{SCRIPT}` from repo root and parse `FEATURE_DIR`.

Perform a **non-blocking inventory scan** вЂ” read each file if present, note its absence if not. Never abort because a file is missing; missing files are themselves state signals.

**Files to scan and what to extract**:

| File | Signals to extract |
|---|---|
| `.specify/memory/constitution.md` | Exists? Style mode set? Plot structure set? Version? `Author Bio (Short)` filled (not `[PLACEHOLDER]`)? |
| `FEATURE_DIR/spec.md` | Exists? Contains `[NEEDS CLARIFICATION]`? Character arc count? Series position? |
| `FEATURE_DIR/plan.md` | Exists? Phase 0 docs generated? Story Bible Check results (any вќЊ VIOLATION)? Scene outline count? |
| `FEATURE_DIR/tasks.md` | Exists? Total tasks, checked tasks, next unchecked task ID? `[FEEDBACK]` tasks open? |
| `FEATURE_DIR/research.md` | Exists? Count of OPEN items by priority (HIGH/MEDIUM/LOW)? |
| `FEATURE_DIR/glossary.md` | Exists? Open Consistency Log violations (Fixed: No count)? `[NEEDS CLARIFICATION]` count? |
| `FEATURE_DIR/characters.md` | Exists? Any `[NEEDS CLARIFICATION]` entries? |
| `FEATURE_DIR/characters/` | Profile file count vs. character count in characters.md? |
| `FEATURE_DIR/outlines/` | Exists? Count by status: DRAFT / APPROVED / SKIP? |
| `FEATURE_DIR/draft/*.md` | Count by status: draft / revised / checked / polished? Oldest unrevised `drafted` date? Any `constitution_version` mismatches vs. current? |
| `FEATURE_DIR/audiodraft/` | Exists? Count of `.ssml` and `_el.xml` files? Any with `version` lower than corresponding prose draft (`STALE AUDIODRAFT`)? Any drafted chapters with no matching audiodraft (`MISSING AUDIODRAFT`)? Only evaluated when `OUTPUT_MODE` is `audiobook` or `both` in `constitution.md`. |
| `FEATURE_DIR/checklists/` | Exists? Count of failing gates (incomplete items)? |
| `FEATURE_DIR/feedback/` | Exists? Files with `Status: unprocessed` or `Status: triaged`? |
| `FEATURE_DIR/pov-structure.md` | Exists? Any audit flags? |
| `FEATURE_DIR/subplots.md` | Exists? Any `SP-NNN` entries with no draft coverage? |
| `FEATURE_DIR/relationships.md` | Exists? Any `REL-NNN` entries with missing arc beats or no draft coverage? |
| `FEATURE_DIR/series-bible.md` or `series/series-bible.md` | Exists? Current book registered? Open `SX-NNN` contradictions? |
| `FEATURE_DIR/synopsis.md` | Exists? |
| `FEATURE_DIR/pacing-arc.md` | Exists? (`speckit.pacing` primarily renders a Mermaid tension chart inline; this file is only present if explicitly saved вЂ” treat as absent unless the file actually exists) |
| `FEATURE_DIR/query-letter.md` | Exists? Submission tracker rows present? |
| `FEATURE_DIR/cover-brief.md` | Exists? Platform field set? Image generation prompt present? |

---

## Step 2 вЂ” Determine Workflow Phase

From the inventory, classify the project into one of these phases. Use the **lowest satisfied gate**:

| Phase | Key signals |
|---|---|
| **0 вЂ” No project yet** | `constitution.md` missing OR `spec.md` missing |
| **1 вЂ” Planning** | `spec.md` exists; `plan.md` missing OR has `[NEEDS CLARIFICATION]` в†’ `tasks.md` missing |
| **2 вЂ” Pre-draft** | `tasks.md` exists; no (`draft/`) OR fewer than 3 chapters drafted |
| **3 вЂ” Active drafting** | At least one unchecked draft task; not all chapters drafted |
| **4 вЂ” Revision / checking** | All chapters drafted; some still `draft` or `revised` (no checklist pass yet) |
| **5 вЂ” Polishing** | All chapters `checked`; some not yet `polished` |
| **6 вЂ” Post-draft / submission prep** | All chapters `polished`; `synopsis.md` or `query-letter.md` missing or incomplete |
| **7 вЂ” Ready** | All chapters `polished`; synopsis and query letter present; no open CRITICAL feedback tasks |

A project may have signals from multiple phases (e.g., revising some chapters while still drafting others) вЂ” report the **primary phase** but surface the cross-phase signals as secondary items.

---

## Step 3 вЂ” Build the Guidance Report

Emit the report in this structure:

```
в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ
  SPECKIT HELP вЂ” [STORY_TITLE or "New Project"]
  Phase: [phase name]   |   [Date]
в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ
```

### Section A вЂ” Project Snapshot (3вЂ“5 lines, no tables)

A brief prose paragraph summarising where the project stands. Include:
- What exists and what is still missing
- Key progress indicator (e.g., "7 of 22 chapters drafted; 2 polished")
- Any single most visible problem (e.g., "12 open research items including 3 HIGH-priority flags")

### Section B вЂ” Blockers (URGENT)

List only true blockers вЂ” things that will cause incorrect or wasted work if not resolved first.

For each blocker:
```
рџ”ґ URGENT: [one-line description]
   Why it matters : [1вЂ“2 sentences explaining the downstream risk]
   Fix with       : /speckit.[command] [arguments]
```

**Blocker detection rules:**
- `constitution.md` missing в†’ blocks everything
- `spec.md` has `[NEEDS CLARIFICATION]` items and `plan.md` already exists в†’ constitution/spec drift risk
- `plan.md` Story Bible Check has вќЊ VIOLATION в†’ blocks drafting
- `research.md` has HIGH-priority OPEN items AND any chapters are in `draft` or later в†’ factual debt compounding
- `checklists/` has chapters with failing gates AND those chapters are already `revised` or `polished` в†’ quality regression
- `outlines/` has `status: DRAFT` entries AND `draft/` has chapters with IDs that match в†’ outline gate was skipped
- `tasks.md` has `[FEEDBACK]` CRITICAL tasks open AND new chapters are being drafted в†’ structural debt
- `series-bible.md` has open `SX-NNN` contradictions в†’ series integrity risk before next book
- `constitution_version` mismatch in any `_v3`+ draft files в†’ story bible changed after polishing
- `OUTPUT_MODE` is `audiobook` or `both` AND `audiodraft/` is absent or has fewer files than `draft/` в†’ audiobook drafts not generated yet; compounding debt if prose revisions continue without audiodraft resync
- Any chapter is `polished` but its audiodraft `version` is lower than the prose `version` в†’ audiodraft trail is stale; audio will not match final prose

### Section C вЂ” Primary Recommendation (NEXT)

The single highest-value action to take right now:

```
вњ… NEXT: [one-line description]
   Why now         : [2вЂ“3 sentences of reasoning вЂ” what is gained, what is avoided]
   Command         : /speckit.[command] [typical arguments]
   Expected output : [what file or state change this produces]
   Watch for       : [1 thing to check or decide during this step]
```

### Section D вЂ” Coming Up (SOON)

2вЂ“3 actions that follow logically after the primary recommendation. For each:

```
рџ”µ SOON: [one-line description]
   Command : /speckit.[command]
   Why     : [one sentence]
```

### Section E вЂ” Optional Improvements

Things that are not on the critical path but would strengthen the manuscript:

```
вљЄ OPTIONAL: [description]
   Command : /speckit.[command] [arguments]
   Value   : [one sentence on what this adds]
```

**Common optional improvements to detect and surface:**
- `glossary.md` has 3+ `[NEEDS CLARIFICATION]` в†’ `speckit.glossary add`
- Characters without individual profile files in `characters/` в†’ `speckit.plan` (regenerate Phase 0)
- `pov-structure.md` absent on a multi-POV spec в†’ `speckit.pov draft`
- `subplots.md` exists but has SP entries with no draft coverage past Act I в†’ `speckit.analyze`
- No `feedback/` directory в†’ no beta readers yet; worth noting for the revision phase
- `speckit.versions` never used (no tagged versions) в†’ suggest tagging the first draft send
- `series-bible.md` not yet created for a non-standalone spec в†’ `speckit.series init`
- All chapters polished but `pacing-arc.md` absent в†’ `speckit.pacing` (tension arc audit before submission)
- `OUTPUT_MODE` is `audiobook` or `both` AND stale or missing audiodrafts exist в†’ `speckit.export audio` to review manifest and identify gaps before synthesis
- All chapters polished but no sensitivity review on record (no session note or annotation in `constitution.md`) в†’ `speckit.sensitivity` (recommend before querying, especially for work featuring communities outside author's experience)
- `subplots.md` exists with SP entries marked unresolved and draft is past Act II в†’ `speckit.subplot resolve` to close dramatic questions before synopsis/query
- `Author Bio (Short)` in `constitution.md` is `[PLACEHOLDER]` or absent в†’ `speckit.bio draft` (becomes a hard blocker before query submission; surface as URGENT in Phase 6)
- `cover-brief.md` absent AND project is Phase 5 or later в†’ `speckit.cover` (platform-ready visual brief for cover design or AI-assisted image generation)
- All chapters polished but `speckit.statistics` never run в†’ `speckit.statistics` (word-count and POV/act breakdown for submission metadata and pacing audit)

### Section F вЂ” Phase-Relevant Command Cheatsheet

Only show commands relevant to the current phase (not the full list):

```
в”Ѓв”Ѓ Commands for this phase в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ
[Show 4вЂ“8 commands as: /speckit.command вЂ” one-line reminder]
в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ
```

Use these per-phase command sets:

**Phase 0вЂ“1 (Setup / Planning):**
`speckit.constitution`, `speckit.specify`, `speckit.clarify`, `speckit.brainstorm`, `speckit.research add`, `speckit.series init`

**Phase 2 (Pre-draft):**
`speckit.plan`, `speckit.tasks`, `speckit.analyze`, `speckit.outline`, `speckit.pov`, `speckit.research status`

**Phase 3 (Active drafting):**
`speckit.implement`, `speckit.checklist`, `speckit.continuity`, `speckit.status`, `speckit.glossary audit`, `speckit.research check`, `speckit.subplot check`

**Phase 4 (Revision / checking):**
`speckit.revise`, `speckit.checklist`, `speckit.continuity`, `speckit.pacing`, `speckit.versions diff`, `speckit.glossary check`

**Phase 5 (Polishing):**
`speckit.polish`, `speckit.pacing`, `speckit.sensitivity`, `speckit.versions list`, `speckit.glossary check`, `speckit.continuity`

**Phase 6 (Submission prep):**
`speckit.synopsis`, `speckit.export`, `speckit.query`, `speckit.pacing`, `speckit.sensitivity`, `speckit.feedback`, `speckit.bio`, `speckit.cover`, `speckit.statistics`, `speckit.series update`, `speckit.versions tag`

---

## Handling a Free-Text Question

If `{{args}}` contains a question or sentence (not a flag):

1. Read the question.
2. Perform the full inventory scan (Step 1) to ground the answer in the actual project state.
3. Answer the question directly first (2вЂ“4 sentences).
4. Follow with the relevant subset of Sections BвЂ“D: blockers if any, the single best next action, and one "coming up" item.
5. Skip Sections E and F unless directly relevant to the question.

Examples:
- *"Is my spec ready to plan?"* в†’ Check spec.md for `[NEEDS CLARIFICATION]`, character arc count, series position completeness, and constitution.md gates. Answer directly: "Yes, proceed" or "No, because X".
- *"I'm stuck after chapter 3"* в†’ Check what tasks.md shows as next unchecked task. Check if chapter 3's checklist has failing gates. Check if research.md has HIGH items relevant to the chapters ahead. Give a concrete unblocking recommendation.
- *"Should I run continuity or polish next?"* в†’ Check chapter statuses. If any are `draft` with no checklist pass, continuity first. If all are `checked`, polish. Explain the gate order.

---

## Handling `--chapter [CHAPTER_ID]`

Scope the report to a single chapter:

1. Find all version files for the chapter ID in `draft/`.
2. Find the checklist file in `checklists/` if present.
3. Find any open feedback tasks in `tasks.md` referencing this chapter ID.
4. Find any continuity issues referencing this chapter in `.specify/memory/constitution.md` or `glossary.md` Consistency Log.
5. Report:
   - Current version and status
   - Open blockers specific to this chapter
   - The single next action for this chapter: run checklist / run revise item X / run polish / already done

---

## Post-Execution Hooks

- Look for `hooks.after_help` in `.specify/extensions.yml`. Process as standard hook block. Skip silently if absent.
